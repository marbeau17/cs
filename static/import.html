<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSVインポート - CS AI回答支援</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800">CSVインポート</h1>
                <p class="text-xs text-slate-500" id="channel-info">チャネルにナレッジを一括登録</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="/channels" class="text-xs text-blue-600 border border-blue-200 px-2.5 py-1 rounded-lg hover:bg-blue-50">チャネル一覧</a>
            <a href="/admin" class="text-xs text-slate-500 border border-slate-200 px-2.5 py-1 rounded-lg hover:bg-slate-50">管理画面</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-8">
        <!-- Channel selector -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-slate-700 mb-2">インポート先チャネル</label>
            <select id="channel-select" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <option value="">チャネルを選択...</option>
            </select>
        </div>

        <!-- CSV format guide -->
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
            <h3 class="text-sm font-semibold text-blue-800 mb-2">CSVフォーマット</h3>
            <p class="text-xs text-blue-700 mb-2">以下のいずれかのカラム名を自動検出します：</p>
            <div class="grid grid-cols-2 gap-2 text-xs text-blue-600">
                <div><strong>質問列:</strong> 質問, question, お客様からの質問, Q</div>
                <div><strong>回答列:</strong> 回答, answer, 返信, response, A</div>
            </div>
            <p class="text-xs text-blue-600 mt-2">エンコーディング: UTF-8 / Shift-JIS 自動判定</p>
        </div>

        <!-- Drop zone -->
        <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-xl p-12 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition-all mb-6">
            <svg class="w-12 h-12 text-slate-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-sm text-slate-500 mb-1">CSVファイルをドラッグ＆ドロップ</p>
            <p class="text-xs text-slate-400">またはクリックしてファイルを選択</p>
            <input type="file" id="file-input" accept=".csv" class="hidden">
        </div>

        <!-- File info -->
        <div id="file-info" class="hidden bg-white border border-slate-200 rounded-lg p-4 mb-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <div>
                        <p class="text-sm font-medium text-slate-700" id="file-name"></p>
                        <p class="text-xs text-slate-400" id="file-size"></p>
                    </div>
                </div>
                <button onclick="clearFile()" class="text-xs text-red-500 hover:text-red-700">削除</button>
            </div>
        </div>

        <!-- Import button -->
        <button id="import-btn" onclick="startImport()" disabled
            class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            インポート開始
        </button>

        <!-- Progress -->
        <div id="progress-area" class="hidden mt-6">
            <div class="bg-white border border-slate-200 rounded-lg p-4">
                <div class="flex items-center gap-3 mb-3">
                    <svg class="w-5 h-5 text-blue-500 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span class="text-sm text-slate-700">インポート処理中...</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="results-area" class="hidden mt-6 animate-fade-in">
            <div class="bg-white border border-slate-200 rounded-lg p-5">
                <h3 class="text-sm font-semibold text-slate-800 mb-3">インポート結果</h3>
                <div class="grid grid-cols-2 gap-3 text-sm">
                    <div class="bg-slate-50 rounded-lg p-3">
                        <p class="text-xs text-slate-500">読み取り行数</p>
                        <p class="text-lg font-bold text-slate-800" id="result-parsed">-</p>
                    </div>
                    <div class="bg-emerald-50 rounded-lg p-3">
                        <p class="text-xs text-emerald-600">インポート成功</p>
                        <p class="text-lg font-bold text-emerald-700" id="result-imported">-</p>
                    </div>
                    <div class="bg-amber-50 rounded-lg p-3">
                        <p class="text-xs text-amber-600">重複除外</p>
                        <p class="text-lg font-bold text-amber-700" id="result-duplicates">-</p>
                    </div>
                    <div class="bg-red-50 rounded-lg p-3">
                        <p class="text-xs text-red-600">エラー</p>
                        <p class="text-lg font-bold text-red-700" id="result-errors">-</p>
                    </div>
                </div>
                <div id="error-details" class="hidden mt-3 text-xs text-red-600 bg-red-50 rounded-lg p-3"></div>
                <button onclick="resetImport()" class="mt-4 w-full px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm hover:bg-slate-200">
                    別のファイルをインポート
                </button>
            </div>
        </div>
    </main>

    <script>
        let selectedFile = null;
        let selectedChannel = '';

        // Auth check
        async function checkAuth() {
            const res = await fetch('/api/me');
            if (res.status === 401) { window.location.href = '/login'; return; }
            const user = await res.json();
            if (!user.is_admin) { window.location.href = '/channels'; }
        }

        // Load channels
        async function loadChannels() {
            const res = await fetch('/api/channels');
            const channels = await res.json();
            const select = document.getElementById('channel-select');
            channels.forEach(ch => {
                const opt = document.createElement('option');
                opt.value = ch.slug;
                opt.textContent = ch.name + (ch.description ? ' — ' + ch.description : '');
                select.appendChild(opt);
            });

            // Auto-select from URL param
            const params = new URLSearchParams(window.location.search);
            const preselect = params.get('channel');
            if (preselect) {
                select.value = preselect;
                selectedChannel = preselect;
                updateImportBtn();
            }
        }

        document.getElementById('channel-select').addEventListener('change', (e) => {
            selectedChannel = e.target.value;
            updateImportBtn();
        });

        // Drag & drop
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.name.endsWith('.csv')) {
                alert('CSVファイルを選択してください');
                return;
            }
            selectedFile = file;
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
            document.getElementById('file-info').classList.remove('hidden');
            dropZone.classList.add('hidden');
            updateImportBtn();
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            document.getElementById('file-info').classList.add('hidden');
            dropZone.classList.remove('hidden');
            updateImportBtn();
        }

        function updateImportBtn() {
            document.getElementById('import-btn').disabled = !(selectedFile && selectedChannel);
        }

        async function startImport() {
            if (!selectedFile || !selectedChannel) return;

            const btn = document.getElementById('import-btn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> 処理中...';

            document.getElementById('progress-area').classList.remove('hidden');
            document.getElementById('results-area').classList.add('hidden');

            // Animate progress bar
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress = Math.min(progress + Math.random() * 15, 90);
                document.getElementById('progress-bar').style.width = progress + '%';
            }, 500);

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const res = await fetch('/api/channels/' + selectedChannel + '/import', {
                    method: 'POST',
                    body: formData,
                });
                const result = await res.json();

                clearInterval(progressInterval);
                document.getElementById('progress-bar').style.width = '100%';

                setTimeout(() => {
                    document.getElementById('progress-area').classList.add('hidden');
                    document.getElementById('results-area').classList.remove('hidden');

                    document.getElementById('result-parsed').textContent = result.total_parsed || 0;
                    document.getElementById('result-imported').textContent = result.imported || 0;
                    document.getElementById('result-duplicates').textContent = result.duplicates_removed || 0;
                    document.getElementById('result-errors').textContent = result.errors || 0;

                    if (result.error_details && result.error_details.length > 0) {
                        const detailsEl = document.getElementById('error-details');
                        detailsEl.classList.remove('hidden');
                        detailsEl.innerHTML = result.error_details.map(e =>
                            '<p>' + e.row + '... → ' + e.error + '</p>'
                        ).join('');
                    }

                    if (result.error) {
                        document.getElementById('result-errors').textContent = result.error;
                    }
                }, 500);
            } catch (err) {
                clearInterval(progressInterval);
                alert('インポートに失敗しました: ' + err.message);
            }

            btn.disabled = false;
            btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> インポート開始';
        }

        function resetImport() {
            clearFile();
            document.getElementById('results-area').classList.add('hidden');
            document.getElementById('progress-bar').style.width = '0%';
        }

        checkAuth();
        loadChannels();
    </script>
</body>
</html>
