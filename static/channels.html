<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チャネル選択 - ますびと商店 CS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header (same style as main app) -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800">CS AI回答支援</h1>
                <p class="text-xs text-slate-500">チャネルを選択してください</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center text-xs font-bold" id="user-avatar"></div>
                <span class="text-sm font-medium text-slate-700" id="user-name"></span>
            </div>
            <a href="/admin" id="admin-link" class="text-xs text-slate-500 hover:text-blue-600 border border-slate-200 px-2.5 py-1 rounded-lg hover:bg-slate-50 transition-colors hidden">管理画面</a>
            <button onclick="logout()" class="text-xs text-slate-400 hover:text-red-500">ログアウト</button>
        </div>
    </header>

    <!-- Channel grid -->
    <main class="max-w-5xl mx-auto p-8">
        <div id="channels-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards loaded dynamically -->
        </div>
    </main>

    <!-- Create channel modal (hidden by default) -->
    <div id="create-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 mx-4 animate-fade-in">
            <h2 class="text-lg font-bold text-slate-800 mb-4">新しいチャネルを作成</h2>
            <form id="create-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">チャネル名 *</label>
                    <input type="text" name="name" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="例: ABCストア">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">スラッグ（URL用） *</label>
                    <input type="text" name="slug" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="例: abc-store">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">説明</label>
                    <input type="text" name="description" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="例: ABCストアのカスタマーサポート">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">AIシステムプロンプト *</label>
                    <textarea name="system_prompt" rows="4" required class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="あなたは○○のカスタマーサポートです。..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">挨拶文</label>
                        <input type="text" name="greeting_prefix" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="お客様...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">署名</label>
                        <input type="text" name="signature" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm" placeholder="○○ストア">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">テーマカラー</label>
                    <input type="color" name="color" value="#2563EB" class="w-12 h-8 rounded cursor-pointer">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm font-medium">キャンセル</button>
                    <button type="submit" class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">作成する</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function loadUser() {
            try {
                const res = await fetch('/api/me');
                if (res.status === 401) { window.location.href = '/login'; return; }
                currentUser = await res.json();
                document.getElementById('user-name').textContent = currentUser.name;
                document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
                if (currentUser.is_admin) {
                    document.getElementById('admin-link').classList.remove('hidden');
                }
            } catch { window.location.href = '/login'; }
        }

        async function loadChannels() {
            const res = await fetch('/api/channels');
            const channels = await res.json();
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';

            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl border border-slate-200 p-6 hover:shadow-lg hover:border-blue-300 transition-all cursor-pointer';
                card.onclick = () => window.location.href = '/?channel=' + ch.slug;
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white text-lg font-bold" style="background:${ch.color || '#2563EB'}">
                            ${ch.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="font-semibold text-slate-800">${ch.name}</h3>
                            <p class="text-xs text-slate-400">${ch.slug}</p>
                        </div>
                    </div>
                    <p class="text-sm text-slate-600 mb-4">${ch.description || '説明なし'}</p>
                    <div class="text-xs text-slate-400">クリックしてサポート開始 →</div>
                `;
                grid.appendChild(card);
            });

            // Add create button for admins
            if (currentUser && currentUser.is_admin) {
                const addCard = document.createElement('div');
                addCard.className = 'bg-slate-50 rounded-xl border-2 border-dashed border-slate-300 p-6 hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer flex flex-col items-center justify-center min-h-[180px]';
                addCard.onclick = () => document.getElementById('create-modal').classList.remove('hidden');
                addCard.innerHTML = `
                    <svg class="w-10 h-10 text-slate-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/>
                    </svg>
                    <span class="text-sm font-medium text-slate-500">新しいチャネルを作成</span>
                `;
                grid.appendChild(addCard);
            }
        }

        function closeModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = new FormData(e.target);
            const body = Object.fromEntries(form.entries());
            const res = await fetch('/api/channels', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (res.ok) {
                closeModal();
                loadChannels();
            } else {
                alert('作成に失敗しました');
            }
        });

        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/login');
        }

        loadUser().then(loadChannels);
    </script>
</body>
</html>
