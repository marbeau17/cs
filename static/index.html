<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ますびと商店 - カスタマーサポートAI支援</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }

        @keyframes pulse-bg {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: block; }
        .htmx-request .hide-on-request { display: none; }

        textarea:focus { outline: none; }

        /* スクロールバーのスタイリング */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800">ますびと商店</h1>
                <p class="text-xs text-slate-500">カスタマーサポートAI回答支援</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="user-info" class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center text-xs font-bold" id="user-avatar"></div>
                    <div>
                        <span class="text-sm font-medium text-slate-700" id="user-name"></span>
                        <span class="text-xs text-slate-400 ml-1" id="user-role"></span>
                    </div>
                </div>
                <button onclick="logout()" class="text-xs text-slate-400 hover:text-red-500 transition-colors">ログアウト</button>
            </div>
            <div id="stats-display" class="text-xs text-slate-500">
                <span class="inline-flex items-center gap-1">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full"></span>
                    ナレッジDB: <span id="stats-count">読込中...</span>件
                </span>
            </div>
            <div class="text-xs text-slate-400">
                <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-[10px]">Ctrl+Enter</kbd> 生成
                <span class="mx-1">|</span>
                <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-[10px]">Shift+Enter</kbd> 学習
                <span class="mx-1">|</span>
                <kbd class="px-1.5 py-0.5 bg-slate-100 rounded text-[10px]">Esc</kbd> リセット
            </div>
        </div>
    </header>

    <!-- メインコンテンツ: 3ペインレイアウト -->
    <main class="flex-1 flex overflow-hidden">

        <!-- 左ペイン: 問い合わせ入力エリア (30%) -->
        <section id="left-pane" class="w-[30%] border-r border-slate-200 bg-white flex flex-col">
            <div class="px-4 py-3 border-b border-slate-100">
                <h2 class="text-sm font-semibold text-slate-700">新規問い合わせ</h2>
                <p class="text-xs text-slate-400 mt-0.5">顧客メール本文をペースト</p>
            </div>
            <form id="generate-form" class="flex-1 flex flex-col p-4"
                  hx-post="/api/generate"
                  hx-target="#editor-area"
                  hx-indicator="#left-pane">
                <textarea
                    id="question-input"
                    name="question"
                    placeholder="お客様からの問い合わせ内容をここにペーストしてください..."
                    class="flex-1 w-full p-3 border border-slate-200 rounded-lg text-sm leading-relaxed resize-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-slate-300"
                    autofocus
                ></textarea>
                <button
                    type="submit"
                    class="mt-3 w-full px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    回答案を生成
                    <span class="text-xs opacity-70">(Ctrl+Enter)</span>
                </button>
                <!-- ローディングインジケーター -->
                <div class="htmx-indicator mt-3">
                    <div class="flex items-center gap-2 text-sm text-blue-600">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        AIが回答を生成中...
                    </div>
                </div>
            </form>
        </section>

        <!-- メインペイン: AI回答エディタ (45%) -->
        <section class="w-[45%] flex flex-col bg-slate-50">
            <div class="px-4 py-3 bg-white border-b border-slate-100">
                <h2 class="text-sm font-semibold text-slate-700">AI回答エディタ</h2>
                <p class="text-xs text-slate-400 mt-0.5">生成された回答を確認・編集</p>
            </div>
            <div class="flex-1 p-4 overflow-y-auto">
                <div id="editor-area">
                    <!-- 初期状態: プレースホルダー -->
                    <div class="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                        <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        <p class="text-sm">左の入力欄に問い合わせをペーストし</p>
                        <p class="text-sm">「回答案を生成」をクリックしてください</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 右ペイン: リファレンス表示エリア (25%) -->
        <section class="w-[25%] border-l border-slate-200 bg-white flex flex-col">
            <div class="px-4 py-3 border-b border-slate-100">
                <h2 class="text-sm font-semibold text-slate-700">参考事例（リファレンス）</h2>
                <p class="text-xs text-slate-400 mt-0.5">AIが参考にした過去の類似Q&A</p>
            </div>
            <div id="reference-area" class="flex-1 p-4 overflow-y-auto">
                <!-- 初期状態: プレースホルダー -->
                <div class="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                    <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <p class="text-xs">回答生成時に</p>
                    <p class="text-xs">参考事例が表示されます</p>
                </div>
            </div>
        </section>
    </main>

    <!-- トースト通知コンテナ -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <!-- JavaScript -->
    <script>
        // --- 統計情報の取得 ---
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('stats-count').textContent = data.total_records || 0;
            } catch (e) {
                document.getElementById('stats-count').textContent = '-';
            }
        }

        // --- ユーザー情報の取得 ---
        async function loadUser() {
            try {
                const res = await fetch('/api/me');
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                const user = await res.json();
                document.getElementById('user-name').textContent = user.name;
                document.getElementById('user-role').textContent = user.role;
                // Avatar: first character of name
                const initial = user.name.charAt(0).toUpperCase();
                document.getElementById('user-avatar').textContent = initial;
                // Store admin status
                window.currentUser = user;
            } catch (e) {
                window.location.href = '/login';
            }
        }

        // --- ログアウト ---
        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => {
                window.location.href = '/login';
            });
        }

        loadUser();
        loadStats();

        // --- クリップボードコピー ---
        function copyToClipboard() {
            const editor = document.getElementById('answer-editor');
            if (!editor) return;
            navigator.clipboard.writeText(editor.value).then(() => {
                showToast('クリップボードにコピーしました', 'success');
            }).catch(() => {
                // フォールバック
                editor.select();
                document.execCommand('copy');
                showToast('クリップボードにコピーしました', 'success');
            });
        }

        // --- 回答を確定 ---
        function learnAndNext() {
            const editor = document.getElementById('answer-editor');
            const questionHidden = document.getElementById('original-question');
            const recordIdHidden = document.getElementById('record-id');
            if (!editor || !questionHidden) return;

            const answer = editor.value.trim();
            const question = questionHidden.value.trim();
            if (!answer || !question) {
                showToast('質問または回答が空です', 'error');
                return;
            }

            // まずクリップボードにコピー
            navigator.clipboard.writeText(answer).catch(() => {});

            // 確定APIへ送信
            const formData = new FormData();
            formData.append('question', question);
            formData.append('answer', answer);
            if (recordIdHidden && recordIdHidden.value) {
                formData.append('record_id', recordIdHidden.value);
            }

            const learnBtn = document.getElementById('learn-btn');
            if (learnBtn) {
                learnBtn.disabled = true;
                learnBtn.textContent = '確定中...';
            }

            fetch('/api/learn', {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (res.ok) {
                    showToast('回答を確定しました！クリップボードにもコピーしました', 'success');
                    resetAll();
                    loadStats();
                } else {
                    showToast('保存に失敗しました', 'error');
                }
            })
            .catch(() => {
                showToast('通信エラーが発生しました', 'error');
            })
            .finally(() => {
                if (learnBtn) {
                    learnBtn.disabled = false;
                    learnBtn.textContent = '回答を確定する';
                }
            });
        }

        // --- リセット ---
        function resetAll() {
            document.getElementById('question-input').value = '';
            document.getElementById('editor-area').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                    <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    <p class="text-sm">左の入力欄に問い合わせをペーストし</p>
                    <p class="text-sm">「回答案を生成」をクリックしてください</p>
                </div>
            `;
            document.getElementById('reference-area').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                    <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <p class="text-xs">回答生成時に</p>
                    <p class="text-xs">参考事例が表示されます</p>
                </div>
            `;
            document.getElementById('question-input').focus();
        }

        // --- トースト表示 ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-lg shadow-lg text-white text-sm font-medium animate-fade-in ${bgColor} mb-2`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- キーボードショートカット ---
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter: 回答生成
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                const form = document.getElementById('generate-form');
                if (form) htmx.trigger(form, 'submit');
            }

            // Shift+Enter: 学習して次へ
            if (e.shiftKey && e.key === 'Enter') {
                e.preventDefault();
                const editor = document.getElementById('answer-editor');
                if (editor) learnAndNext();
            }

            // Escape: リセット
            if (e.key === 'Escape') {
                e.preventDefault();
                resetAll();
            }
        });

        // --- htmxイベント: 生成完了後のハンドリング ---
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'editor-area') {
                const editor = document.getElementById('answer-editor');
                if (editor) editor.focus();
            }
        });

        // --- htmxエラーハンドリング ---
        document.body.addEventListener('htmx:responseError', function(e) {
            showToast('エラーが発生しました。もう一度お試しください。', 'error');
        });
    </script>
</body>
</html>
