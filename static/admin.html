<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - CS AI回答支援</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800">管理画面</h1>
                <p class="text-xs text-slate-500">チャネル管理・設定</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="/channels" class="text-xs text-blue-600 hover:text-blue-800 border border-blue-200 px-2.5 py-1 rounded-lg">チャネル一覧</a>
            <a href="/import" class="text-xs text-blue-600 hover:text-blue-800 border border-blue-200 px-2.5 py-1 rounded-lg hover:bg-blue-50">CSVインポート</a>
            <button onclick="logout()" class="text-xs text-slate-400 hover:text-red-500">ログアウト</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-8">
        <h2 class="text-xl font-bold text-slate-800 mb-6">チャネル管理</h2>
        <div id="admin-channels" class="space-y-4">
            <!-- Loaded dynamically -->
        </div>
    </main>

    <!-- Edit modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 mx-4 max-h-[90vh] overflow-y-auto animate-fade-in">
            <h2 class="text-lg font-bold text-slate-800 mb-4">チャネル設定を編集</h2>
            <form id="edit-form" class="space-y-4">
                <input type="hidden" name="id" id="edit-id">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">チャネル名</label>
                    <input type="text" name="name" id="edit-name" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">説明</label>
                    <input type="text" name="description" id="edit-description" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">AIシステムプロンプト</label>
                    <textarea name="system_prompt" id="edit-system-prompt" rows="5" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">挨拶文</label>
                        <input type="text" name="greeting_prefix" id="edit-greeting" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">署名</label>
                        <input type="text" name="signature" id="edit-signature" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">テーマカラー</label>
                    <input type="color" name="color" id="edit-color" class="w-12 h-8 rounded cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">デフォルトAIモデル</label>
                    <select name="default_model" id="edit-model" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm">
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash — 高速・低コスト</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro — 高品質・思考モデル</option>
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash — 安定版</option>
                        <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite — 最軽量・最速</option>
                        <option value="gemini-flash-latest">Gemini Flash Latest — 最新Flash</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview — 最新・最高品質</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview — 次世代Flash</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeEditModal()" class="flex-1 px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm font-medium">キャンセル</button>
                    <button type="submit" class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">保存する</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function checkAdmin() {
            const res = await fetch('/api/me');
            if (res.status === 401) { window.location.href = '/login'; return; }
            const user = await res.json();
            if (!user.is_admin) { window.location.href = '/channels'; return; }
        }

        async function loadAdminChannels() {
            const res = await fetch('/api/channels');
            const channels = await res.json();
            const container = document.getElementById('admin-channels');
            container.innerHTML = '';

            for (const ch of channels) {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg border border-slate-200 p-5 flex items-center justify-between';
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold" style="background:${ch.color || '#2563EB'}">
                            ${ch.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="font-semibold text-slate-800">${ch.name}</h3>
                            <p class="text-xs text-slate-400">${ch.slug} · ${ch.description || ''}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='editChannel(${JSON.stringify(ch).replace(/'/g, "&#39;")})' class="text-xs px-3 py-1.5 border border-slate-200 rounded-lg hover:bg-slate-50">編集</button>
                        <button onclick="window.location.href='/import?channel=${ch.slug}'" class="text-xs px-3 py-1.5 border border-blue-200 text-blue-600 rounded-lg hover:bg-blue-50">インポート</button>
                        <button onclick="window.location.href='/api/channels/${ch.slug}/export'" class="text-xs px-3 py-1.5 border border-emerald-200 text-emerald-600 rounded-lg hover:bg-emerald-50">エクスポート</button>
                        <button onclick="deleteChannel('${ch.id}', '${ch.name}')" class="text-xs px-3 py-1.5 border border-red-200 text-red-600 rounded-lg hover:bg-red-50">削除</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function editChannel(ch) {
            document.getElementById('edit-id').value = ch.id;
            document.getElementById('edit-name').value = ch.name;
            document.getElementById('edit-description').value = ch.description || '';
            document.getElementById('edit-system-prompt').value = ch.system_prompt || '';
            document.getElementById('edit-greeting').value = ch.greeting_prefix || '';
            document.getElementById('edit-signature').value = ch.signature || '';
            document.getElementById('edit-color').value = ch.color || '#2563EB';
            document.getElementById('edit-model').value = ch.default_model || 'gemini-2.5-flash';
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = new FormData(e.target);
            const id = form.get('id');
            const body = {};
            for (const [k, v] of form.entries()) { if (k !== 'id') body[k] = v; }
            const res = await fetch('/api/channels/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (res.ok) { closeEditModal(); loadAdminChannels(); }
            else { alert('更新に失敗しました'); }
        });

        async function deleteChannel(id, name) {
            if (!confirm(name + ' を削除しますか？関連するナレッジデータも全て削除されます。')) return;
            const res = await fetch('/api/channels/' + id, { method: 'DELETE' });
            if (res.ok) loadAdminChannels();
            else alert('削除に失敗しました');
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/login');
        }

        checkAdmin().then(loadAdminChannels);
    </script>
</body>
</html>
